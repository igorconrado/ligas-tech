<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — IbBot & IbTech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/global.css">
<link rel="stylesheet" href="/assets/css/components.css">
<link rel="stylesheet" href="/assets/css/pages/404.css">
</head>
<body>
<div class="grid"></div>
<div class="glow-r"></div>
<div class="glow-b"></div>
<div class="content">
  <div class="error-num">
    <span class="r">4</span><span class="w">0</span><span class="b">4</span>
  </div>
  <div class="error-title">PÁGINA NÃO ENCONTRADA.</div>
  <p class="error-sub">Essa rota não existe ou foi movida. Volte pra home e tente de novo.</p>
  <div class="error-links">
    <a class="link-btn primary" href="/">Voltar pra home</a>
    <a class="link-btn ghost" href="/membros/login">Área de membros</a>
  </div>
  <div class="error-mono">IbBot & IbTech · Ibmec BH · 2026</div>
</div>

<div class="cursor" id="cursor"></div>
<script>
(function(){
  const c = document.getElementById('cursor');
  if (!c || window.matchMedia('(pointer: coarse)').matches) return;
  document.addEventListener('mousemove', e => {
    c.style.left = e.clientX + 'px';
    c.style.top  = e.clientY + 'px';
  });
  document.addEventListener('mouseleave', () => c.classList.add('is-hidden'));
  document.addEventListener('mouseenter', () => c.classList.remove('is-hidden'));
  document.querySelectorAll('a, button, [onclick], label, .dir-card, .faq-item').forEach(el => {
    el.addEventListener('mouseenter', () => c.classList.add('is-link'));
    el.addEventListener('mouseleave', () => c.classList.remove('is-link'));
  });
  document.querySelectorAll('.cta-b, .split-card.b, .nav-links a[href*="ibtech"]').forEach(el => {
    el.addEventListener('mouseenter', () => c.classList.add('is-blue'));
    el.addEventListener('mouseleave', () => c.classList.remove('is-blue'));
  });
  const reveals = document.querySelectorAll('.section-kicker, .section-title, .section-body');
  reveals.forEach(el => el.classList.add('reveal'));
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); }});
  }, { threshold: 0.15 });
  reveals.forEach(el => io.observe(el));
})();
</script>
</body>
</html>
