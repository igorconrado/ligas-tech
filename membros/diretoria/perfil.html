<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Perfil — Diretoria · IbBot & IbTech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/global.css">
<link rel="stylesheet" href="/assets/css/components.css">
<link rel="stylesheet" href="/assets/css/pages/dashboard.css">
<link rel="stylesheet" href="/assets/css/pages/dashboard-diretoria.css">
<link rel="stylesheet" href="/assets/css/ui/empty-state.css">
<link rel="stylesheet" href="/assets/css/ui/skeleton.css">
<link rel="stylesheet" href="/assets/css/ui/confirm.css">
<link rel="stylesheet" href="/assets/css/ui/a11y.css">
</head>
<body>
<a href="#main-content" class="skip-link">Pular para o conteúdo</a>
<main id="main-content" class="content" style="padding: var(--sp-6) var(--sp-7); max-width: 900px">
  <h1 style="font-family: var(--font-display); font-size: var(--fs-h1); letter-spacing: .02em; margin-bottom: var(--sp-5)">Meu Perfil</h1>
  <div class="perfil-grid">
    <div class="perfil-card">
      <div class="perfil-av-wrap"><div class="perfil-av"><span id="perfil-av-text">—</span></div></div>
      <div class="perfil-name" id="perfil-name-display">—</div>
      <div class="perfil-role">Diretoria</div>
      <div class="perfil-liga-badge b" id="perfil-liga-badge">—</div>
      <div class="perfil-stats">
        <div class="perfil-stat"><div class="perfil-stat-num" id="perfil-stat-presenca">—</div><div class="perfil-stat-label">Presença</div></div>
        <div class="perfil-stat"><div class="perfil-stat-num" id="perfil-stat-entregas">—</div><div class="perfil-stat-label">Entregas</div></div>
      </div>
    </div>
    <div class="perfil-form">
      <div class="perfil-form-grid">
        <div class="form-group"><label class="form-label">Nome</label><input class="form-input" type="text" id="p-nome"></div>
        <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="perfil-email" disabled></div>
        <div class="form-group"><label class="form-label">LinkedIn</label><input class="form-input" type="url" id="p-linkedin" placeholder="linkedin.com/in/..."></div>
        <div class="form-group"><label class="form-label">GitHub</label><input class="form-input" type="url" id="p-github" placeholder="github.com/..."></div>
        <div class="form-group" style="grid-column: 1 / -1"><label class="form-label">Bio</label><textarea class="form-input form-textarea" id="p-bio" style="min-height: 80px"></textarea></div>
      </div>
      <button class="form-save" id="btn-salvar-perfil" onclick="savePerfil()"><span id="btn-salvar-texto">SALVAR →</span></button>
    </div>
  </div>
</main>
<script type="module" src="/assets/js/pages/perfil.js"></script>
</body>
</html>
