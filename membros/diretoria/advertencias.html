<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advertências — Diretoria · IbBot & IbTech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/global.css">
<link rel="stylesheet" href="/assets/css/components.css">
<link rel="stylesheet" href="/assets/css/pages/dashboard-diretoria.css">
<link rel="stylesheet" href="/assets/css/pages/ux-improvements.css">
<link rel="stylesheet" href="/assets/css/ui/empty-state.css">
<link rel="stylesheet" href="/assets/css/ui/skeleton.css">
<link rel="stylesheet" href="/assets/css/ui/confirm.css">
<link rel="stylesheet" href="/assets/css/ui/a11y.css">
</head>
<body>
<a href="#main-content" class="skip-link">Pular para o conteúdo</a>

<!-- MODAL ADVERTÊNCIA -->
<div class="modal-overlay" id="modal-advertencia" onclick="if(event.target===this)closeModal('modal-advertencia')">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('modal-advertencia')" aria-label="Fechar">✕</button>
    <div class="modal-title">ADVERTÊNCIA</div>
    <div class="modal-sub" id="adv-modal-sub">Registrar advertência ou anotação</div>
    <div class="adv-form">
      <div class="form-group">
        <label class="form-label">Membro</label>
        <select class="form-select" id="advertencia-membro" required>
          <option value="" disabled selected>Selecione o membro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select class="form-select" id="adv-tipo">
          <option value="leve">Leve</option>
          <option value="grave">Grave</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Descrição</label>
        <textarea class="adv-textarea" id="adv-descricao" placeholder="Descreva o motivo..."></textarea>
      </div>
      <button class="btn-sm r" style="align-self:flex-end" onclick="handleSalvarAdvertencia()">Registrar →</button>
    </div>
  </div>
</div>

<main id="main-content" class="content" style="padding: var(--sp-6) var(--sp-7); max-width: 1200px">
  <div class="panel-full">
    <div class="panel-head">
      <h1 class="panel-title" style="font-family:var(--font-display);font-size:var(--fs-h1);letter-spacing:.02em">Advertências e anotações</h1>
      <button class="btn-sm r" onclick="openAdvModal()">+ Registrar</button>
    </div>
    <table class="tbl">
      <thead><tr><th>Membro</th><th>Tipo</th><th>Motivo</th><th>Data</th><th></th></tr></thead>
      <tbody id="adv-tbl"></tbody>
    </table>
  </div>
</main>
<script type="module" src="/assets/js/pages/advertencias-diretoria.js"></script>
</body>
</html>
