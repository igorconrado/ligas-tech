<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visão Geral — Área de Membros · IbBot & IbTech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/global.css">
<link rel="stylesheet" href="/assets/css/components.css">
<link rel="stylesheet" href="/assets/css/pages/dashboard.css">
<link rel="stylesheet" href="/assets/css/ui/empty-state.css">
<link rel="stylesheet" href="/assets/css/ui/skeleton.css">
<link rel="stylesheet" href="/assets/css/ui/confirm.css">
<link rel="stylesheet" href="/assets/css/ui/a11y.css">
</head>
<body>
<a href="#main-content" class="skip-link">Pular para o conteúdo</a>

<!-- ONBOARDING OVERLAY -->
<div class="onboarding-overlay" id="onboarding" style="display:none">
  <div class="onboarding-box">
    <div class="ob-steps">
      <div class="ob-step active" id="step-0"></div>
      <div class="ob-step" id="step-1"></div>
      <div class="ob-step" id="step-2"></div>
    </div>
    <div id="ob-content"></div>
  </div>
</div>

<main id="main-content" class="content" style="padding: var(--sp-6) var(--sp-7); max-width: 1200px">

  <div style="margin-bottom:var(--sp-5); display:flex; align-items:center; justify-content:space-between; gap:var(--sp-4)">
    <h1 style="font-family:var(--font-display);font-size:var(--fs-h1);letter-spacing:.02em">Visão Geral</h1>
    <span class="topbar-liga b" id="topbar-liga"></span>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Presença</div>
      <div class="metric-val g" id="metric-presenca-val">—</div>
      <div class="metric-sub" id="metric-presenca-sub"><span class="skeleton skeleton--text"></span></div>
    </div>
    <div class="metric">
      <div class="metric-label">Entregas</div>
      <div class="metric-val b" id="metric-entregas-val">—</div>
      <div class="metric-sub" id="metric-entregas-sub"><span class="skeleton skeleton--text"></span></div>
    </div>
    <div class="metric destaque">
      <div class="metric-label">Próximo encontro</div>
      <div class="metric-val w" id="metric-proximo-val" style="font-size:18px;margin-top:4px">—</div>
      <div class="metric-sub" id="metric-proximo-sub"><span class="skeleton skeleton--text"></span></div>
    </div>
    <div class="metric">
      <div class="metric-label">Semestre</div>
      <div class="metric-val w" id="metric-semestre-val">—</div>
      <div class="metric-sub" id="metric-semestre-sub"></div>
    </div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Próximas aulas</div></div>
      <div class="panel-body">
        <table class="tbl">
          <thead><tr><th>Aula</th><th>Prazo</th><th>Status</th></tr></thead>
          <tbody id="tbody-proximas-aulas"></tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Entregas recentes</div></div>
      <div class="panel-body">
        <table class="tbl">
          <thead><tr><th>Aula</th><th>Prazo</th><th>Status</th></tr></thead>
          <tbody id="tbody-dash-entregas"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="panel-full">
    <div class="panel-head"><div class="panel-title">Progresso no semestre</div></div>
    <div class="panel-body">
      <div class="prog-section">
        <div class="prog-item">
          <div class="prog-header"><span class="prog-title">Presença</span><span class="prog-pct" id="pct-presenca">0%</span></div>
          <div class="prog-bar"><div class="prog-fill b" id="bar-presenca" style="width:0%"></div></div>
        </div>
        <div class="prog-item">
          <div class="prog-header"><span class="prog-title">Entregas</span><span class="prog-pct" id="pct-entregas">0%</span></div>
          <div class="prog-bar"><div class="prog-fill g" id="bar-entregas" style="width:0%"></div></div>
        </div>
        <div class="prog-item">
          <div class="prog-header"><span class="prog-title">Aulas concluídas</span><span class="prog-pct" id="pct-aulas">0%</span></div>
          <div class="prog-bar"><div class="prog-fill a" id="bar-aulas" style="width:0%"></div></div>
        </div>
      </div>
    </div>
  </div>

</main>
<script type="module" src="/assets/js/pages/dashboard.js"></script>
</body>
</html>
