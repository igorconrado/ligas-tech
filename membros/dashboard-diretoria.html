<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visão Geral — Diretoria · IbBot & IbTech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/global.css">
<link rel="stylesheet" href="/assets/css/components.css">
<link rel="stylesheet" href="/assets/css/pages/dashboard-diretoria.css">
<link rel="stylesheet" href="/assets/css/pages/ux-improvements.css">
<link rel="stylesheet" href="/assets/css/ui/empty-state.css">
<link rel="stylesheet" href="/assets/css/ui/skeleton.css">
<link rel="stylesheet" href="/assets/css/ui/confirm.css">
<link rel="stylesheet" href="/assets/css/ui/a11y.css">
</head>
<body>
<a href="#main-content" class="skip-link">Pular para o conteúdo</a>
<main id="main-content" class="content" style="padding: var(--sp-6) var(--sp-7); max-width: 1300px">

  <h1 style="font-family:var(--font-display);font-size:var(--fs-h1);letter-spacing:.02em;margin-bottom:var(--sp-5)">Visão Geral</h1>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Membros ativos</div><div class="metric-val w" id="metric-membros">—</div><div class="metric-sub" id="metric-membros-sub"></div></div>
    <div class="metric"><div class="metric-label">Presença média</div><div class="metric-val g" id="metric-presenca-media">—</div><div class="metric-sub">Último encontro</div></div>
    <div class="metric"><div class="metric-label">Entregas pendentes</div><div class="metric-val r" id="pending-count">—</div><div class="metric-sub" id="metric-entregas-pendentes-sub"></div></div>
    <div class="metric"><div class="metric-label">Advertências ativas</div><div class="metric-val r" id="metric-advertencias">—</div><div class="metric-sub">Esse semestre</div></div>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Últimas presenças</div>
        <a class="btn-sm ghost" href="/membros/diretoria/encontros">Ver tudo</a>
      </div>
      <div class="panel-body">
        <table class="tbl">
          <thead><tr><th>Encontro</th><th>Liga</th><th>Taxa</th></tr></thead>
          <tbody id="tbody-ultimas-presencas"></tbody>
        </table>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Entregas atrasadas</div>
        <a class="btn-sm ghost" href="/membros/diretoria/entregas">Ver tudo</a>
      </div>
      <div class="panel-body">
        <table class="tbl">
          <thead><tr><th>Membro</th><th>Aula</th><th>Status</th></tr></thead>
          <tbody id="tbody-entregas-atrasadas"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="panel-full">
    <div class="panel-head"><div class="panel-title">Visão geral dos membros</div></div>
    <div class="panel-body">
      <table class="tbl" id="overview-tbl"></table>
    </div>
  </div>

</main>
<script type="module" src="/assets/js/pages/dashboard-diretoria.js"></script>
</body>
</html>
